name: Update Feed

on:
  schedule:
    - cron: "30 2 * * *"   # 8:00 AM IST  (2:30 AM UTC)
    - cron: "30 13 * * *"  # 7:00 PM IST  (1:30 PM UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push data/feed.json back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run feed pipeline (with redirect resolution)
        run: RESOLVE_REDIRECTS=true npx tsx server/scripts/runPipeline.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit updated feed.json
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/feed.json
          git diff --staged --quiet && echo "No changes to feed" || \
            git commit -m "chore: auto-update feed [$(date -u +%Y-%m-%dT%H:%M:%SZ)]" && \
            git push
